            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            scroll-snap-type: x mandatory;
        }
        
        .glass-nav > button {
            scroll-snap-align: center;
        }

        .nav-link { transition: all 0.2s ease-in-out; }
        .nav-link.active {
            background: var(--knox-dark);
            color: white;
            font-weight: 700;
        }
        .nav-link:not(.active):hover {
            background-color: #e5e7eb; 
            color: var(--knox-red);
        }

        .mobile-tab { transition: all 0.2s ease; position: relative; }
        .mobile-tab.active {
            color: white;
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            border-radius: 9999px;
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.2);
        }

        .content-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        aside::-webkit-scrollbar { width: 4px; }
        aside::-webkit-scrollbar-track { background: transparent; }
        aside::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
        aside::-webkit-scrollbar-thumb:hover { background: var(--knox-red); }

        function _createChartInstance() {
            const proteinGrams = 130;
            const carbsGrams = 310;
            const fatsGrams = 70;

            const proteinCalories = proteinGrams * 4;
            const carbsCalories = carbsGrams * 4;
            const fatsCalories = fatsGrams * 9;
            const ctx = document.getElementById('macroChart').getContext('2d');
            
            if (macroChart) { macroChart.destroy(); }
            
            macroChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: [`Protein (~${proteinGrams}g)`, `Carbs (~${carbsGrams}g)`, `Fats (~${fatsGrams}g)`],
                    datasets: [{
                        data: [proteinCalories, carbsCalories, fatsCalories],
                        backgroundColor: ['#ef4444', '#3b82f6', '#f59e0b'],
                        borderColor: '#ffffff',
                        borderWidth: 4,
                        hoverOffset: 8,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    layout: { padding: 10 },
                    animation: {
                        duration: 1000,
                        easing: 'easeOutQuart',
                    },
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: { size: 12, family: "'Inter', sans-serif", weight: '800' },
                                color: '#27272a',
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        }
                    }
                }
            });
        }
        
        function initMacroChart() {
            const chartSkeleton = document.getElementById('chart-skeleton');
            const chartWrapper = document.getElementById('chart-wrapper');
            
            if (typeof Chart !== 'undefined') {
                _createChartInstance(); 
                if (chartSkeleton && chartWrapper) {
                    chartSkeleton.classList.add('hidden');
                    chartWrapper.classList.remove('hidden');
                }
            } else {
                if (chartSkeleton) { chartSkeleton.classList.remove('hidden'); }
                setTimeout(initMacroChart, 50);
            }
        }

                                <ul class="list-disc list-inside space-y-2 pl-2 text-sm leading-relaxed text-zinc-600">
                                    <li><strong class="text-zinc-800">No Refunds</strong> after plan delivery or questionnaire submission.</li>
                                    <li>Exceptions made only for technical errors on our side.</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        mainContent.addEventListener('click', (e) => {
            const header = e.target.closest('.collapsible-header');
            if (header) {
                const content = header.nextElementSibling;
                header.classList.toggle('expanded');
                content.classList.toggle('expanded');
            }
        });

        function handleNavigation(e) {
            if(e.target.tagName === 'A' && e.target.getAttribute('href') === '#') { e.preventDefault(); }

            const target = e.target.closest('[data-view]');
            if (!target) return;

            const view = target.dataset.view;
            if (view) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                
                if (view === 'dashboard') { renderDashboard(); } 
                else if (view === 'explore') { renderExplore(); } 
                else if (view === 'keyNotes') { renderKeyNotes(); } 
                else if (view === 'terms') { renderTerms(); } 
                else if (view === 'workout') { renderWorkout(); } 
                else if (view.startsWith('week')) { renderWeek(view); }
                
                setActiveLink(view);
                closeMobileMenu();
                
                const activeMobileTab = document.querySelector(`.mobile-tab[data-view="${view}"]`);
                if(activeMobileTab && mobileNavStrip) {
                    const scrollLeft = activeMobileTab.offsetLeft - (mobileNavStrip.clientWidth / 2) + (activeMobileTab.clientWidth / 2);
                    mobileNavStrip.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                }
            }
        }

        navigation.addEventListener('click', handleNavigation);
        mobileNavStrip.addEventListener('click', handleNavigation);

        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebar.classList.remove('-translate-x-full');
            sidebar.classList.add('translate-x-0'); 
            overlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        });

        const closeMobileMenu = () => {
            sidebar.classList.add('-translate-x-full');
            sidebar.classList.remove('translate-x-0'); 
            overlay.classList.add('hidden');
            document.body.style.overflow = '';
        }

        overlay.addEventListener('click', closeMobileMenu);
        sidebarClose.addEventListener('click', closeMobileMenu);

        function setActiveLink(view) {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            const activeSidebarLink = document.querySelector(`.nav-link[data-view="${view}"]`);
            if (activeSidebarLink) activeSidebarLink.classList.add('active');

            document.querySelectorAll('.mobile-tab').forEach(tab => {
                tab.classList.remove('active');
                tab.classList.remove('text-white');
                tab.classList.add('text-zinc-500');
            });
            const activeMobileTab = document.querySelector(`.mobile-tab[data-view="${view}"]`);
            if (activeMobileTab) {
                activeMobileTab.classList.add('active');
                activeMobileTab.classList.remove('text-zinc-500');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            setActiveLink('dashboard');
            renderDashboard();
        });

    </script>
</body>
</html>
